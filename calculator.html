<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>체감온도 계산기 - 써밋클라비온</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    
    <style>
        body {
            background-color: #f4f6f8;
            font-family: 'Pretendard', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #app-container {
            background: white;
            width: 100%;
            max-width: 420px;
            min-height: 100vh;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            padding: 30px 20px;
            box-sizing: border-box;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 800;
            color: #111;
            margin: 0 0 5px 0;
            line-height: 1.3;
        }
        .header p.subtitle {
            font-size: 0.9rem;
            color: #00838f;
            margin: 0;
            font-weight: 600;
        }

        /* 입력 폼 섹션 */
        .input-section {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 20px;
            margin-top: 25px;
            margin-bottom: 25px;
        }

        .input-group {
            margin-bottom: 15px;
        }
        .input-group:last-child {
            margin-bottom: 0;
        }
        .input-group label {
            display: block;
            font-size: 0.9rem;
            color: #555;
            margin-bottom: 8px;
            font-weight: 700;
        }
        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .input-wrapper input {
            width: 100%;
            padding: 12px 40px 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: 600;
            box-sizing: border-box;
            font-family: inherit;
            color: #333;
        }
        .input-wrapper input:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 2px rgba(52, 152, 219, 0.2);
        }
        .input-unit {
            position: absolute;
            right: 15px;
            color: #888;
            font-weight: 600;
        }

        /* 결과 표시 섹션 */
        .result-section {
            text-align: center;
            padding: 20px 0;
            border-top: 2px dashed #eee;
        }
        .result-label {
            font-size: 1rem;
            color: #777;
            font-weight: 600;
            margin-bottom: 10px;
        }
        #calc-result {
            font-size: 4.5rem;
            font-weight: 800;
            margin: 0;
            line-height: 1;
            letter-spacing: -2px;
            color: #111;
        }
        
        .status-badge {
            display: inline-block;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 1rem;
            font-weight: 700;
            margin-top: 20px;
            margin-bottom: 15px;
        }

        /* 조치사항 박스 */
        .action-box {
            background: #fff;
            border: 1px solid #eee;
            border-radius: 12px;
            padding: 15px;
            text-align: left;
            font-size: 0.9rem;
            color: #444;
            line-height: 1.5;
            display: none; /* 초기에는 숨김 */
        }
        .action-box.visible {
            display: block;
        }
        .action-box strong {
            display: block;
            margin-bottom: 5px;
            color: #111;
        }

        .footer {
            font-size: 0.8rem;
            color: #aaa;
            text-align: center;
            margin-top: 30px;
        }
    </style>
</head>
<body>

    <div id="app-container">
        <div class="header">
            <h1>써밋클라비온현장<br>체감온도 계산기</h1>
            <p class="subtitle">안전보건공단(KOSHA) 산출 기준</p>
        </div>

        <div class="input-section">
            <div class="input-group">
                <label for="input-temp">🌡️ 현재 기온을 입력하세요</label>
                <div class="input-wrapper">
                    <input type="number" id="input-temp" placeholder="예: 33.5" step="0.1">
                    <span class="input-unit">°C</span>
                </div>
            </div>
            <div class="input-group">
                <label for="input-hum">💧 현재 습도를 입력하세요</label>
                <div class="input-wrapper">
                    <input type="number" id="input-hum" placeholder="예: 60" step="1">
                    <span class="input-unit">%</span>
                </div>
            </div>
        </div>

        <div class="result-section">
            <div class="result-label">산출된 체감온도</div>
            <h2 id="calc-result">--°C</h2>
            <div id="status-badge" class="status-badge" style="background: #eee; color: #888;">값을 입력해주세요</div>
            
            <div id="action-box" class="action-box">
                <strong>[안전보건공단 권고 조치사항]</strong>
                <span id="action-text">기온과 습도를 입력하면 조치사항이 표시됩니다.</span>
            </div>
        </div>

        <div class="footer">
            ※ 현장에 비치된 온습도계의 수치를 입력해 주세요.
        </div>
    </div>

    <script>
        // 기상청/안전보건공단 기준 체감온도 산출 함수
        function calculateKmaFeelTemp(Ta, RH) {
            const Tw = Ta * Math.atan(0.151977 * Math.pow(RH + 8.313659, 0.5)) 
                     + Math.atan(Ta + RH) 
                     - Math.atan(RH - 1.676331) 
                     + 0.00391838 * Math.pow(RH, 1.5) * Math.atan(0.023101 * RH) 
                     - 4.686035;

            const feelTemp = -0.2442 
                           + 0.55399 * Tw 
                           + 0.45535 * Ta 
                           - 0.0022 * Math.pow(Tw, 2) 
                           + 0.00278 * Tw * Ta 
                           + 3.0;

            return parseFloat(feelTemp.toFixed(1));
        }

        function updateCalculation() {
            const tempInput = document.getElementById('input-temp').value;
            const humInput = document.getElementById('input-hum').value;

            // 값이 둘 다 입력되었을 때만 계산
            if (tempInput === "" || humInput === "") {
                document.getElementById('calc-result').innerText = "--°C";
                document.getElementById('calc-result').style.color = "#111";
                const badge = document.getElementById('status-badge');
                badge.innerText = "값을 입력해주세요";
                badge.style.backgroundColor = "#eee";
                badge.style.color = "#888";
                document.getElementById('action-box').classList.remove('visible');
                return;
            }

            const Ta = parseFloat(tempInput);
            const RH = parseFloat(humInput);
            const heatIndex = calculateKmaFeelTemp(Ta, RH);

            let statusText = "";
            let actionText = "";
            let textColor = "";
            let bgColor = "";

            if (heatIndex >= 38) {
                statusText = "위험";
                textColor = "#c0392b"; bgColor = "#fdedec";
                actionText = "• 매시간 15분 휴식 (무더위 시간대)<br>• <b>모든 옥외작업 중지</b><br>• 시원하고 깨끗한 물 제공";
            } else if (heatIndex >= 35) {
                statusText = "경고";
                textColor = "#d35400"; bgColor = "#fbeee6";
                actionText = "• <b>매시간 45분 휴식</b><br>• 무더위 시간대(14~17시) 옥외작업 중지<br>• 시원하고 깨끗한 물 제공";
            } else if (heatIndex >= 33) {
                statusText = "주의";
                textColor = "#b97700"; bgColor = "#fef9e7";
                actionText = "• <b>매시간 15분 이상 휴식</b><br>• 무더위 시간대 옥외작업 단축<br>• 시원하고 깨끗한 물 제공";
            } else if (heatIndex >= 31) {
                statusText = "관심";
                textColor = "#00838f"; bgColor = "#e0f2f1";
                actionText = "• 규칙적인 수분 섭취<br>• 작업 중 지속적인 그늘 휴식 부여";
            } else {
                statusText = "정상 작업";
                textColor = "#27ae60"; bgColor = "#e9f7ef";
                actionText = "• 일상적인 작업 진행<br>• 맑고 시원한 물 상시 비치";
            }

            // 결과 화면 업데이트
            document.getElementById("calc-result").innerText = `${heatIndex}°C`;
            document.getElementById("calc-result").style.color = textColor;

            const badge = document.getElementById("status-badge");
            badge.innerText = `${statusText} 단계`;
            badge.style.color = textColor;
            badge.style.backgroundColor = bgColor;

            document.getElementById("action-text").innerHTML = actionText;
            document.getElementById("action-box").classList.add('visible');
            document.getElementById("action-box").style.borderColor = textColor;
        }

        // 입력창에 숫자를 칠 때마다 실시간으로 계산되도록 이벤트 연결
        document.getElementById('input-temp').addEventListener('input', updateCalculation);
        document.getElementById('input-hum').addEventListener('input', updateCalculation);
    </script>
</body>
</html>
