<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>체감온도 계산기 - 써밋클라비온</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    
    <style>
        body {
            background-color: #f4f6f8;
            font-family: 'Pretendard', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #app-container {
            background: white;
            width: 100%;
            max-width: 420px;
            min-height: 100vh;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            padding: 30px 20px;
            box-sizing: border-box;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 800;
            color: #111;
            margin: 0 0 5px 0;
            line-height: 1.3;
        }
        .header p.subtitle {
            font-size: 0.9rem;
            color: #00838f;
            margin: 0;
            font-weight: 600;
        }

        /* 입력 폼 섹션 */
        .input-section {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 20px;
            margin-top: 25px;
            margin-bottom: 25px;
        }

        .input-group {
            margin-bottom: 15px;
        }
        .input-group:last-child {
            margin-bottom: 0;
        }
        .input-group label {
            display: block;
            font-size: 0.9rem;
            color: #555;
            margin-bottom: 8px;
            font-weight: 700;
        }
        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .input-wrapper input {
            width: 100%;
            padding: 12px 40px 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: 600;
            box-sizing: border-box;
            font-family: inherit;
            color: #333;
        }
        .input-wrapper input:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 2px rgba(52, 152, 219, 0.2);
        }
        .input-unit {
            position: absolute;
            right: 15px;
            color: #888;
            font-weight: 600;
        }

        /* 결과 표시 섹션 */
        .result-section {
            text-align: center;
            padding: 20px 0;
            border-top: 2px dashed #eee;
        }
        .result-label {
            font-size: 1rem;
            color: #777;
            font-weight: 600;
            margin-bottom: 10px;
        }
        #calc-result {
            font-size: 4.5rem;
            font-weight: 800;
            margin: 0;
            line-height: 1;
            letter-spacing: -2px;
            color: #111;
        }
        
        .status-badge {
            display: inline-block;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 1rem;
            font-weight: 700;
            margin-top: 20px;
            margin-bottom: 20px;
        }

        /* [신규 위치] 온도별 휴식 기준 섹션 */
        .rest-section {
            margin-bottom: 25px;
            display: none; /* 기본 숨김, 입력시 노출 */
        }
        .rest-guideline {
            font-size: 0.95rem;
            color: #333;
            line-height: 1.6;
            background: #fff;
            padding: 15px;
            border-radius: 12px;
            border: 2px solid #eee;
            text-align: left;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }
        .rest-guideline strong {
            display: block;
            margin-bottom: 8px;
            font-size: 1rem;
        }
        .rest-item {
            display: flex;
            margin-bottom: 4px;
        }
        .rest-item:last-child {
            margin-bottom: 0;
        }
        .rest-item .time { font-weight: 700; width: 70px; flex-shrink: 0; color: #555; }

        /* [항시 노출] 5대 예방수칙 섹션 */
        .rules-section {
            background: #fff;
            border: 1px solid #eee;
            border-radius: 12px;
            padding: 15px;
            box-sizing: border-box;
        }
        .action-title {
            font-size: 0.95rem;
            font-weight: 800;
            color: #222;
            margin-bottom: 15px;
            text-align: center;
        }
        .basic-rules {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .rule-item {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 12px 8px;
            text-align: center;
        }
        .rule-item.full {
            grid-column: span 2;
        }
        .rule-icon { font-size: 1.8rem; margin-bottom: 5px; }
        .rule-name { font-weight: 800; font-size: 1rem; color: #111; margin-bottom: 4px; }
        .rule-desc { font-size: 0.75rem; color: #0066cc; word-break: keep-all; line-height: 1.3; }

        .footer {
            font-size: 0.8rem;
            color: #aaa;
            text-align: center;
            margin-top: 30px;
        }
    </style>
</head>
<body>

    <div id="app-container">
        <!-- 헤더 -->
        <div class="header">
            <h1>써밋클라비온현장<br>체감온도 계산기</h1>
            <p class="subtitle">안전보건공단(KOSHA) 산출 기준</p>
        </div>

        <!-- 입력부 -->
        <div class="input-section">
            <div class="input-group">
                <label for="input-temp">🌡️ 현재 기온을 입력하세요</label>
                <div class="input-wrapper">
                    <input type="number" id="input-temp" placeholder="예: 34.5" step="0.1">
                    <span class="input-unit">°C</span>
                </div>
            </div>
            <div class="input-group">
                <label for="input-hum">💧 현재 습도를 입력하세요</label>
                <div class="input-wrapper">
                    <input type="number" id="input-hum" placeholder="예: 60" step="1">
                    <span class="input-unit">%</span>
                </div>
            </div>
        </div>

        <!-- 체감온도 표기부 -->
        <div class="result-section">
            <div class="result-label">산출된 체감온도</div>
            <h2 id="calc-result">--°C</h2>
            <div id="status-badge" class="status-badge" style="background: #eee; color: #888;">값을 입력해주세요</div>
        </div>

        <!-- [선택 노출] 현재 온도 휴식 기준 (체감온도 표기와 5대 수칙 사이 공간) -->
        <div id="rest-section" class="rest-section">
            <div class="rest-guideline" id="rest-guideline">
                <!-- JS 동적 삽입 -->
            </div>
        </div>

        <!-- [항시 노출] 온열질환 예방 5대 기본수칙 -->
        <div class="rules-section">
            <div class="action-title">[온열질환 예방 5대 기본수칙]</div>
            <div class="basic-rules">
                <div class="rule-item">
                    <div class="rule-icon">💧</div>
                    <div class="rule-name">물</div>
                    <div class="rule-desc">시원하고 깨끗한 물 제공</div>
                </div>
                <div class="rule-item">
                    <div class="rule-icon">⛱️</div>
                    <div class="rule-name">그늘</div>
                    <div class="rule-desc">냉방시설 / 휴게시설 설치</div>
                </div>
                <div class="rule-item">
                    <div class="rule-icon">🌳</div>
                    <div class="rule-name">휴식</div>
                    <div class="rule-desc">체감온도에 따른 휴식 제공</div>
                </div>
                <div class="rule-item">
                    <div class="rule-icon">❄️</div>
                    <div class="rule-name">보냉장구</div>
                    <div class="rule-desc">아이스조끼 등 개인 장구</div>
                </div>
                <div class="rule-item full">
                    <div class="rule-icon">🚑</div>
                    <div class="rule-name">응급조치</div>
                    <div class="rule-desc">의식 없을 경우 지체 없이 119 신고</div>
                </div>
            </div>
        </div>

        <div class="footer">
            ※ 현장에 비치된 온습도계의 수치를 입력해 주세요.
        </div>
    </div>

    <script>
        // 체감온도 공식 공식
        function calculateKmaFeelTemp(Ta, RH) {
            const Tw = Ta * Math.atan(0.151977 * Math.pow(RH + 8.313659, 0.5)) 
                     + Math.atan(Ta + RH) 
                     - Math.atan(RH - 1.676331) 
                     + 0.00391838 * Math.pow(RH, 1.5) * Math.atan(0.023101 * RH) 
                     - 4.686035;

            const feelTemp = -0.2442 
                           + 0.55399 * Tw 
                           + 0.45535 * Ta 
                           - 0.0022 * Math.pow(Tw, 2) 
                           + 0.00278 * Tw * Ta 
                           + 3.0;

            return parseFloat(feelTemp.toFixed(1));
        }

        function updateCalculation() {
            const tempInput = document.getElementById('input-temp').value;
            const humInput = document.getElementById('input-hum').value;

            // 값 미입력 시 휴식 기준 숨김 처리
            if (tempInput === "" || humInput === "") {
                document.getElementById('calc-result').innerText = "--°C";
                document.getElementById('calc-result').style.color = "#111";
                const badge = document.getElementById('status-badge');
                badge.innerText = "값을 입력해주세요";
                badge.style.backgroundColor = "#eee";
                badge.style.color = "#888";
                document.getElementById('rest-section').style.display = 'none';
                return;
            }

            const Ta = parseFloat(tempInput);
            const RH = parseFloat(humInput);
            const heatIndex = calculateKmaFeelTemp(Ta, RH);

            let statusText = "";
            let restHtml = "";
            let textColor = "";
            let bgColor = "";

            // 조건별 매칭 및 메시지 구성
            if (heatIndex >= 38) {
                statusText = "위험";
                textColor = "#c0392b"; bgColor = "#fdedec";
                restHtml = `
                    <strong style="color:#c0392b;">🚨 현재 온도 휴식 기준 (위험)</strong>
                    <div style="font-weight:700; font-size:1.05rem; margin-top:5px;">긴급조치를 제외한 옥외작업 중지</div>
                `;
            } else if (heatIndex >= 35) {
                statusText = "경고";
                textColor = "#d35400"; bgColor = "#fbeee6";
                restHtml = `
                    <strong style="color:#d35400;">⚠️ 현재 온도 휴식 기준 (경고)</strong>
                    <div class="rest-item"><div class="time">07~14시</div> <div>매시간 정각부터 20분간 휴식</div></div>
                    <div class="rest-item"><div class="time">14~17시</div> <div style="font-weight:700; color:#d35400;">옥외작업 최소화</div></div>
                `;
            } else if (heatIndex >= 33) {
                statusText = "주의";
                textColor = "#b97700"; bgColor = "#fef9e7";
                restHtml = `
                    <strong style="color:#b97700;">⚠️ 현재 온도 휴식 기준 (주의)</strong>
                    <div class="rest-item"><div class="time">07~14시</div> <div>매시간 정각부터 15분간 휴식</div></div>
                    <div class="rest-item"><div class="time">14~17시</div> <div>매시간 정각부터 15분 <b>이상</b> 휴식</div></div>
                `;
            } else if (heatIndex >= 31) {
                statusText = "관심";
                textColor = "#00838f"; bgColor = "#e0f2f1";
                restHtml = `
                    <strong style="color:#00838f;">ℹ️ 현재 온도 휴식 기준 (관심)</strong>
                    <div class="rest-item"><div class="time">07~14시</div> <div>매시간 정각부터 10분간 휴식</div></div>
                    <div class="rest-item"><div class="time">14~17시</div> <div>매시간 정각부터 15분간 휴식</div></div>
                `;
            } else {
                statusText = "정상 작업";
                textColor = "#27ae60"; bgColor = "#e9f7ef";
                restHtml = `
                    <strong style="color:#27ae60;">✅ 현재 온도 휴식 기준 (정상)</strong>
                    <div style="margin-top:5px;">일상적인 작업 진행 (수시로 시원한 물 섭취)</div>
                `;
            }

            // UI 및 색상 동적 변경
            document.getElementById("calc-result").innerText = `${heatIndex}°C`;
            document.getElementById("calc-result").style.color = textColor;

            const badge = document.getElementById("status-badge");
            badge.innerText = `${statusText} 단계`;
            badge.style.color = textColor;
            badge.style.backgroundColor = bgColor;

            // 휴식 기준 표시 및 테두리 색상 동기화
            const restGuidelineBox = document.getElementById("rest-guideline");
            restGuidelineBox.innerHTML = restHtml;
            restGuidelineBox.style.borderColor = textColor;
            
            document.getElementById('rest-section').style.display = 'block';
        }

        document.getElementById('input-temp').addEventListener('input', updateCalculation);
        document.getElementById('input-hum').addEventListener('input', updateCalculation);
    </script>
</body>
</html>
