<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>써밋클라비온 현장 체감온도</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    
    <style>
        body {
            background-color: #f4f6f8;
            font-family: 'Pretendard', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #app-container {
            background: white;
            width: 100%;
            max-width: 420px;
            min-height: 100vh;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            padding: 30px 20px;
            box-sizing: border-box;
            position: relative;
        }

        /* 상단 헤더 */
        .header h1 {
            font-size: 1.6rem;
            font-weight: 800;
            color: #111;
            margin: 0 0 5px 0;
            letter-spacing: -0.5px;
        }
        .header p.address {
            font-size: 0.9rem;
            color: #777;
            margin: 0;
        }

        /* 메인 온도 표시 */
        .main-temp {
            margin-top: 30px;
        }
        #feel-temp-display {
            font-size: 4.5rem;
            font-weight: 800;
            margin: 0;
            line-height: 1;
            letter-spacing: -2px;
        }

        /* 서브 정보 (실제 기온, 날씨) */
        .sub-info {
            font-size: 0.95rem;
            color: #555;
            margin-top: 15px;
            margin-bottom: 10px;
            font-weight: 500;
        }

        /* 상태 뱃지 */
        .status-badge {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 700;
            margin-bottom: 30px;
        }

        /* 4칸 그리드 레이아웃 */
        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 25px;
        }

        .grid-item {
            background-color: #f8f9fa;
            border-radius: 16px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .grid-label {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .grid-value {
            font-size: 1.5rem;
            font-weight: 800;
            color: #111;
        }

        /* [추가] 온도별 휴식 기준 섹션 */
        .rest-section {
            margin-bottom: 25px;
            display: none; /* 데이터 로드 전 숨김 */
        }
        .rest-guideline {
            font-size: 0.95rem;
            color: #333;
            line-height: 1.6;
            background: #fff;
            padding: 15px;
            border-radius: 12px;
            border: 2px solid #eee;
            text-align: left;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }
        .rest-guideline strong {
            display: block;
            margin-bottom: 8px;
            font-size: 1rem;
        }
        .rest-item {
            display: flex;
            margin-bottom: 4px;
        }
        .rest-item:last-child {
            margin-bottom: 0;
        }
        .rest-item .time { font-weight: 700; width: 70px; flex-shrink: 0; color: #555; }

        /* [추가] 5대 예방수칙 섹션 (항시 노출) */
        .rules-section {
            background: #fff;
            border: 1px solid #eee;
            border-radius: 12px;
            padding: 15px;
            box-sizing: border-box;
        }
        .action-title {
            font-size: 0.95rem;
            font-weight: 800;
            color: #222;
            margin-bottom: 15px;
            text-align: center;
        }
        .basic-rules {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .rule-item {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 12px 8px;
            text-align: center;
        }
        .rule-item.full {
            grid-column: span 2;
        }
        .rule-icon { font-size: 1.8rem; margin-bottom: 5px; }
        .rule-name { font-weight: 800; font-size: 1rem; color: #111; margin-bottom: 4px; }
        .rule-desc { font-size: 0.75rem; color: #0066cc; word-break: keep-all; line-height: 1.3; }

        /* 하단 문구 */
        .footer {
            font-size: 0.8rem;
            color: #aaa;
            text-align: center;
            margin-top: 40px;
        }
    </style>
</head>
<body>

    <div id="app-container">
        <div class="header">
            <h1>써밋클라비온</h1>
            <p class="address">서울 영등포구 신길동 3950</p>
        </div>

        <div class="main-temp">
            <h2 id="feel-temp-display" style="color: #ccc;">--°C</h2>
            <p class="sub-info">현재 체감온도 · 실제 기온 <span id="real-temp">--</span>°C · <span id="weather-icon">--</span></p>
            <div id="status-badge" class="status-badge" style="background: #eee; color: #888;">데이터 수집중...</div>
        </div>

        <div class="grid-container">
            <div class="grid-item">
                <div class="grid-label"><span style="color:#3498db;">💧</span> 습도</div>
                <div class="grid-value" id="humidity-display">--%</div>
            </div>
            <div class="grid-item">
                <div class="grid-label"><span style="color:#95a5a6;">💨</span> 풍속</div>
                <div class="grid-value" id="wind-display">--m/s</div>
            </div>
            <div class="grid-item">
                <div class="grid-label"><span style="color:#e74c3c;">🌡️</span> 오늘 최고 체감</div>
                <div class="grid-value" id="max-temp" style="color: #b87333;">--°C</div>
            </div>
            <div class="grid-item">
                <div class="grid-label"><span style="color:#2ecc71;">🌡️</span> 오늘 최저 체감</div>
                <div class="grid-value" id="min-temp" style="color: #27ae60;">--°C</div>
            </div>
        </div>

        <div id="rest-section" class="rest-section">
            <div class="rest-guideline" id="rest-guideline">
                </div>
        </div>

        <div class="rules-section">
            <div class="action-title">[온열질환 예방 5대 기본수칙]</div>
            <div class="basic-rules">
                <div class="rule-item">
                    <div class="rule-icon">💧</div>
                    <div class="rule-name">물</div>
                    <div class="rule-desc">시원하고 깨끗한 물 제공</div>
                </div>
                <div class="rule-item">
                    <div class="rule-icon">⛱️</div>
                    <div class="rule-name">그늘</div>
                    <div class="rule-desc">냉방시설 / 휴게시설 설치</div>
                </div>
                <div class="rule-item">
                    <div class="rule-icon">🌳</div>
                    <div class="rule-name">휴식</div>
                    <div class="rule-desc">체감온도에 따른 휴식 제공</div>
                </div>
                <div class="rule-item">
                    <div class="rule-icon">❄️</div>
                    <div class="rule-name">보냉장구</div>
                    <div class="rule-desc">아이스조끼 등 개인 장구</div>
                </div>
                <div class="rule-item full">
                    <div class="rule-icon">🚑</div>
                    <div class="rule-name">응급조치</div>
                    <div class="rule-desc">의식 없을 경우 지체 없이 119 신고</div>
                </div>
            </div>
        </div>

        <div class="footer">
            ※ 기상청 격자 (nx:59, ny:125) 기준 · 현장 개별 좌표 적용
        </div>
    </div>

    <script>
        const API_KEY = "28995c1bbe4e734196be4efa91be0792789458ffc3d89d9abf04ac9df4d5abdb";
        const NX = "59";
        const NY = "125";

        function calculateKmaFeelTemp(Ta, RH) {
            const Tw = Ta * Math.atan(0.151977 * Math.pow(RH + 8.313659, 0.5)) 
                     + Math.atan(Ta + RH) 
                     - Math.atan(RH - 1.676331) 
                     + 0.00391838 * Math.pow(RH, 1.5) * Math.atan(0.023101 * RH) 
                     - 4.686035;

            const feelTemp = -0.2442 
                           + 0.55399 * Tw 
                           + 0.45535 * Ta 
                           - 0.0022 * Math.pow(Tw, 2) 
                           + 0.00278 * Tw * Ta 
                           + 3.0;

            return parseFloat(feelTemp.toFixed(1));
        }

        function updateWeather() {
            const now = new Date();
            
            if (now.getMinutes() < 40) {
                now.setHours(now.getHours() - 1);
            }
            
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            
            const baseDate = `${year}${month}${day}`;
            const baseTime = String(now.getHours()).padStart(2, '0') + "00";
            
            const url = `https://apis.data.go.kr/1360000/VilageFcstInfoService_2.0/getUltraSrtNcst?serviceKey=${API_KEY}&pageNo=1&numOfRows=10&dataType=JSON&base_date=${baseDate}&base_time=${baseTime}&nx=${NX}&ny=${NY}`;

            fetch(url)
                .then(res => {
                    if (!res.ok) throw new Error('네트워크 응답 에러');
                    return res.json();
                })
                .then(data => {
                    if (!data.response || !data.response.body || !data.response.body.items) {
                        throw new Error('올바르지 않은 데이터 형식');
                    }
                    
                    const items = data.response.body.items.item;
                    const findValue = (cat) => items.find(i => i.category === cat)?.obsrValue || 0;
                    
                    const T1H = parseFloat(findValue("T1H")); 
                    const REH = parseFloat(findValue("REH")); 
                    const WSD = parseFloat(findValue("WSD")); 
                    const PTY = parseInt(findValue("PTY"));   

                    let weatherIcon = "맑음 ☀️";
                    if(PTY === 1 || PTY === 5) weatherIcon = "비 🌧️";
                    else if(PTY === 2 || PTY === 6) weatherIcon = "비/눈 🌨️";
                    else if(PTY === 3 || PTY === 7) weatherIcon = "눈 ❄️";

                    const heatIndex = calculateKmaFeelTemp(T1H, REH);

                    let statusText = "";
                    let restHtml = "";
                    let textColor = "";
                    let bgColor = "";

                    // 실시간 체감온도 기준 - 현장 맞춤형 휴식 안내문 매칭
                    if (heatIndex >= 38) {
                        statusText = "위험";
                        textColor = "#c0392b"; bgColor = "#fdedec";
                        restHtml = `
                            <strong style="color:#c0392b;">🚨 현재 온도 휴식 기준 (위험)</strong>
                            <div style="font-weight:700; font-size:1.05rem; margin-top:5px;">긴급조치를 제외한 옥외작업 중지</div>
                        `;
                    } else if (heatIndex >= 35) {
                        statusText = "경고";
                        textColor = "#d35400"; bgColor = "#fbeee6";
                        restHtml = `
                            <strong style="color:#d35400;">⚠️ 현재 온도 휴식 기준 (경고)</strong>
                            <div class="rest-item"><div class="time">07~14시</div> <div>매시간 정각부터 20분간 휴식</div></div>
                            <div class="rest-item"><div class="time">14~17시</div> <div style="font-weight:700; color:#d35400;">옥외작업 최소화</div></div>
                        `;
                    } else if (heatIndex >= 33) {
                        statusText = "주의";
                        textColor = "#b97700"; bgColor = "#fef9e7";
                        restHtml = `
                            <strong style="color:#b97700;">⚠️ 현재 온도 휴식 기준 (주의)</strong>
                            <div class="rest-item"><div class="time">07~14시</div> <div>매시간 정각부터 15분간 휴식</div></div>
                            <div class="rest-item"><div class="time">14~17시</div> <div>매시간 정각부터 15분 <b>이상</b> 휴식</div></div>
                        `;
                    } else if (heatIndex >= 31) {
                        statusText = "관심";
                        textColor = "#00838f"; bgColor = "#e0f2f1";
                        restHtml = `
                            <strong style="color:#00838f;">ℹ️ 현재 온도 휴식 기준 (관심)</strong>
                            <div class="rest-item"><div class="time">07~14시</div> <div>매시간 정각부터 10분간 휴식</div></div>
                            <div class="rest-item"><div class="time">14~17시</div> <div>매시간 정각부터 15분간 휴식</div></div>
                        `;
                    } else {
                        statusText = "정상 작업";
                        textColor = "#27ae60"; bgColor = "#e9f7ef";
                        restHtml = `
                            <strong style="color:#27ae60;">✅ 현재 온도 휴식 기준 (정상)</strong>
                            <div style="margin-top:5px;">일상적인 작업 진행 (수시로 시원한 물 섭취)</div>
                        `;
                    }

                    // UI 업데이트 및 색상 동기화
                    document.getElementById("feel-temp-display").innerText = `${heatIndex}°C`;
                    document.getElementById("feel-temp-display").style.color = textColor;
                    
                    document.getElementById("real-temp").innerText = T1H;
                    document.getElementById("weather-icon").innerText = weatherIcon;

                    const badge = document.getElementById("status-badge");
                    badge.innerText = `${statusText} 단계`;
                    badge.style.color = textColor;
                    badge.style.backgroundColor = bgColor;

                    document.getElementById("humidity-display").innerText = `${REH}%`;
                    document.getElementById("wind-display").innerText = `${WSD}m/s`;

                    const estimatedMax = (heatIndex >= 33) ? heatIndex + 0.8 : heatIndex + 2.5;
                    const estimatedMin = heatIndex - 5.2;
                    document.getElementById("max-temp").innerText = `${estimatedMax.toFixed(1)}°C`;
                    document.getElementById("min-temp").innerText = `${estimatedMin.toFixed(1)}°C`;

                    // [추가 기능 데이터 삽입] 휴식 기준 박스 바인딩 및 노출
                    const restGuidelineBox = document.getElementById("rest-guideline");
                    restGuidelineBox.innerHTML = restHtml;
                    restGuidelineBox.style.borderColor = textColor;
                    document.getElementById('rest-section').style.display = 'block';
                })
                .catch(err => {
                    console.error(err);
                    document.getElementById("status-badge").innerText = "오류: 새로고침 해주세요";
                });
        }
        
        updateWeather();
    </script>
</body>
</html>
